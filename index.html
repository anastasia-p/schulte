<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Таблица Шульте</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f2ee;
      --surface:   #ffffff;
      --border:    #ddd9d0;
      --text:      #1a1a2e;
      --muted:     #999080;
      --accent:    #1a9e5c;
      --gold:      #c8920a;
      --danger:    #d93050;
      --cell-bg:   #ffffff;
      --shadow:    0 1px 4px rgba(0,0,0,0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ─── HEADER ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-title { line-height: 1.1; }
    .header-sub  { font-size: 9px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; }
    .header-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
      color: var(--text);
    }
    .btn-icon {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      padding: 7px 13px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Share Tech Mono', monospace;
      transition: border-color .2s, color .2s, background .2s;
    }
    .btn-icon:active { border-color: var(--accent); color: var(--accent); }
    .btn-quit { color: var(--danger); border-color: #f0c0c8; }
    .btn-quit:active { background: #fff0f2; border-color: var(--danger); }
    .header-btns { display: flex; gap: 8px; }

    /* ─── STATS BAR ─── */
    .stats {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stat { text-align: center; min-width: 70px; }
    .stat-label { font-size: 8px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
    .stat-value { font-size: 22px; font-weight: bold; font-variant-numeric: tabular-nums; transition: color .3s; }
    .stat-value.accent { color: var(--accent); }
    .stat-value.gold   { color: var(--gold); }
    .stat-value.dim    { color: #ccc8c0; }
    .stat-value.muted  { color: var(--muted); }

    /* ─── HINT ─── */
    .hint {
      text-align: center;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      padding: 7px 0 0;
      flex-shrink: 0;
    }

    /* ─── RESULT BANNER ─── */
    .result-banner {
      margin: 10px 14px 0;
      padding: 12px 16px;
      border-radius: 12px;
      background: #f0faf4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      border: 1px solid #b8e8cc;
    }
    .result-label { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
    .result-value { font-size: 16px; font-weight: bold; }
    .btn-restart {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Unbounded', sans-serif;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      background: var(--accent);
      transition: opacity .2s;
    }
    .btn-restart:active { opacity: .8; }

    /* ─── HISTORY BOTTOM SHEET ─── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      z-index: 101;
      transition: transform .3s cubic-bezier(.32,.72,0,1);
      box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
    }
    .sheet.open { transform: translateX(-50%) translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sheet-title { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
    .sheet-close {
      background: #f4f2ee; border: none; border-radius: 50%;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 14px; color: var(--muted);
      transition: background .15s;
    }
    .sheet-close:active { background: var(--border); }
    .sheet-body {
      max-height: 55vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding-bottom: 24px;
    }
    .history-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 16px;
      border-bottom: 1px solid #f0ece6;
      font-size: 13px;
    }
    .history-row:last-child { border-bottom: none; }
    .history-time-val { font-size: 15px; font-weight: bold; }

    /* ─── GRID ─── */
    .grid-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 10px 4px;
      min-height: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      width: 100%;
      max-width: 400px;
    }
    .cell {
      aspect-ratio: 1;
      background: var(--cell-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(20px, 6vw, 28px);
      font-weight: 400;
      font-family: 'Unbounded', sans-serif;
      color: var(--text);
      cursor: pointer;
      transition: background .12s, border-color .12s, color .12s, transform .1s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      padding: 0;
      box-shadow: var(--shadow);
    }
    .cell:active { transform: scale(0.93); }
    .cell.flash {
      background: #d4f5e4;
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(0.91);
      box-shadow: 0 0 0 3px #1a9e5c22;
    }
    .cell.wrong {
      background: #ffe0e6;
      border-color: var(--danger);
      color: var(--danger);
      transform: scale(1.05);
    }
    .cell.done-state {
      color: #ccc8c0;
      background: #faf8f5;
      border-color: #eae6e0;
      box-shadow: none;
      cursor: default;
    }

    /* ─── PROGRESS BAR ─── */
    .progress-wrap {
      padding: 6px 14px 10px;
      flex-shrink: 0;
    }
    .progress-track {
      height: 4px;
      background: #e8e4de;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--gold);
      transition: width .3s ease, background .5s;
    }
    .progress-fill.complete { background: var(--accent); }

    .footer-note {
      text-align: center;
      font-size: 9px;
      color: #ccc8c0;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding-bottom: 10px;
      flex-shrink: 0;
    }
  </style>

          m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
          m[i].l=1*new Date();
          for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
          k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
      })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=107322341', 'ym');

  <noscript><div><img src="https://mc.yandex.ru/watch/107322341" style="position:absolute; left:-9999px;" alt="" /></div></noscript>

</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-title">
      <div class="header-sub">таблица</div>
      <div class="header-name">ШУЛЬТЕ</div>
    </div>
    <div class="header-btns">
      <button class="btn-icon" id="btnHistory" style="display:none">📊</button>
      <button class="btn-icon btn-quit" id="btnQuit" style="display:none">✕ Выход</button>
      <button class="btn-icon" id="btnRestart">↺</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Следующее</div>
      <div class="stat-value dim" id="statNext">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Время</div>
      <div class="stat-value dim" id="statTime">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Рекорд</div>
      <div class="stat-value muted" id="statBest">—</div>
    </div>
  </div>

  <!-- HINT -->
  <div class="hint" id="hint">нажмите 1 чтобы начать</div>

  <!-- RESULT BANNER -->
  <div class="result-banner" id="resultBanner" style="display:none">
    <div>
      <div class="result-label">Результат</div>
      <div class="result-value" id="resultText"></div>
    </div>
    <button class="btn-restart" id="btnPlayAgain">ЕЩЁ РАЗ</button>
  </div>

  <!-- HISTORY BOTTOM SHEET -->
  <div class="sheet-overlay" id="sheetOverlay"></div>
  <div class="sheet" id="historySheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">История</div>
      <button class="sheet-close" id="btnSheetClose">✕</button>
    </div>
    <div class="sheet-body">
      <div id="historyList"></div>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="footer-note">расширение периферийного зрения</div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); tg.disableVerticalSwipes?.(); }

  const shuffle = arr => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  };

  const fmtTime = ms => {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const rem = s % 60;
    const cs = Math.floor((ms % 1000) / 10);
    if (m > 0) return `${m}:${String(rem).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
    return `${rem}.${String(cs).padStart(2,'0')}с`;
  };

  const getRating = ms => {
    const s = ms / 1000;
    if (s < 25) return { label: '⚡ Феноменально', color: '#1a9e5c' };
    if (s < 35) return { label: '🔥 Отлично',      color: '#4a9e00' };
    if (s < 45) return { label: '👍 Хорошо',       color: '#c8920a' };
    if (s < 60) return { label: '🎯 Норма',         color: '#d07010' };
    return               { label: '💪 Тренируйся!', color: '#d93050' };
  };

  let grid = [], next = 1, status = 'idle';
  let startTime = null, elapsed = 0, timerRAF = null;
  let history = JSON.parse(localStorage.getItem('schulte_history') || '[]');
  let showingHistory = false;

  const $grid         = document.getElementById('grid');
  const $statNext     = document.getElementById('statNext');
  const $statTime     = document.getElementById('statTime');
  const $statBest     = document.getElementById('statBest');
  const $hint         = document.getElementById('hint');
  const $resultBanner = document.getElementById('resultBanner');
  const $resultText   = document.getElementById('resultText');
  const $progressFill = document.getElementById('progressFill');
  const $historySheet  = document.getElementById('historySheet');
  const $sheetOverlay  = document.getElementById('sheetOverlay');
  const $btnSheetClose = document.getElementById('btnSheetClose');
  const $historyList  = document.getElementById('historyList');
  const $btnHistory   = document.getElementById('btnHistory');
  const $btnRestart   = document.getElementById('btnRestart');
  const $btnQuit      = document.getElementById('btnQuit');
  const $btnPlayAgain = document.getElementById('btnPlayAgain');

  const buildGrid = () => {
    grid = shuffle(Array.from({length:25},(_,i)=>i+1));
    $grid.innerHTML = '';
    grid.forEach((num, idx) => {
      const btn = document.createElement('button');
      btn.className = 'cell';
      btn.textContent = num;
      btn.addEventListener('click', () => handleCell(num, idx));
      $grid.appendChild(btn);
    });
  };

  const cells = () => [...$grid.querySelectorAll('.cell')];

  const tickTimer = () => {
    elapsed = Date.now() - startTime;
    $statTime.textContent = fmtTime(elapsed);
    $statTime.className = 'stat-value gold';
    timerRAF = requestAnimationFrame(tickTimer);
  };

  const handleCell = (num, idx) => {
    if (status === 'done') return;
    if (status === 'idle') {
      if (num !== 1) { flashCell(idx, 'wrong'); return; }
      status = 'playing';
      startTime = Date.now();
      $hint.style.display = 'none';
      $btnQuit.style.display = '';
      timerRAF = requestAnimationFrame(tickTimer);
      ym(107322341, 'reachGoal', 'start');
      ym(107322341, 'reachGoal', 'start');
      ym(107322341, 'reachGoal', 'start');
      ym(107322341, 'reachGoal', 'start');
    }
    if (num === next) {
      flashCell(idx, 'flash');
      next++;
      $statNext.textContent = next <= 25 ? next : '✓';
      $statNext.className = 'stat-value accent';
      const pct = ((next - 1) / 25) * 100;
      $progressFill.style.width = pct + '%';
      if (next > 25) { $progressFill.classList.add('complete'); finishGame(); }
    } else {
      flashCell(idx, 'wrong');
      if (tg) tg.HapticFeedback?.impactOccurred('light');
    }
  };

  const flashCell = (idx, cls) => {
    const cell = cells()[idx];
    cell.classList.add(cls);
    setTimeout(() => cell.classList.remove(cls), cls === 'flash' ? 280 : 380);
  };

  const finishGame = () => {
    cancelAnimationFrame(timerRAF);
    status = 'done';
    const total = Date.now() - startTime;
    $statTime.textContent = fmtTime(total);
    $statTime.className = 'stat-value accent';
    cells().forEach(c => c.classList.add('done-state'));
    history = [{ time: total, date: Date.now() }, ...history].slice(0, 10);
    localStorage.setItem('schulte_history', JSON.stringify(history));
    $btnQuit.style.display = 'none';
    ym(107322341, 'reachGoal', 'finish');
    updateBest();
    const r = getRating(total);
    $resultText.textContent = r.label;
    $resultText.style.color = r.color;
    $resultBanner.style.borderColor = r.color + '55';
    $resultBanner.style.display = 'flex';
    renderHistory();
    $btnHistory.style.display = '';
    if (tg) tg.HapticFeedback?.notificationOccurred('success');
    ym(107322341, 'reachGoal', 'finish');
  };

  const updateBest = () => {
    if (!history.length) return;
    const best = Math.min(...history.map(h => h.time));
    $statBest.textContent = fmtTime(best);
    $statBest.className = 'stat-value muted';
  };

  const renderHistory = () => {
    const best = history.length ? Math.min(...history.map(h => h.time)) : null;
    $historyList.innerHTML = history.map(h => {
      const r = getRating(h.time);
      const isBest = h.time === best;
      const timeStr = new Date(h.date).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
      return `<div class="history-row">
        <span style="color:var(--muted);font-size:11px">${timeStr}</span>
        <span class="history-time-val" style="color:${isBest ? 'var(--accent)' : 'var(--text)'}">
          ${isBest ? '★ ' : ''}${fmtTime(h.time)}
        </span>
        <span style="color:${r.color};font-size:11px">${r.label.split(' ').slice(1).join(' ')}</span>
      </div>`;
    }).join('');
  };

  const resetUI = () => {
    $statNext.textContent = '—'; $statNext.className = 'stat-value dim';
    $statTime.textContent = '—'; $statTime.className = 'stat-value dim';
    $hint.style.display = '';
    $resultBanner.style.display = 'none';
    closeHistory();
    $progressFill.style.width = '0%';
    $progressFill.classList.remove('complete');
    $btnQuit.style.display = 'none';
    showingHistory = false;
  };

  const restart = () => {
    cancelAnimationFrame(timerRAF);
    next = 1; status = 'idle'; elapsed = 0; startTime = null;
    resetUI(); updateBest(); buildGrid();
  };

  // Выход — сбрасывает без сохранения результата
  $btnQuit.addEventListener('click', () => {
    if (status !== 'playing') return;
    cancelAnimationFrame(timerRAF);
    next = 1; status = 'idle'; elapsed = 0; startTime = null;
    resetUI(); buildGrid();
    ym(107322341, 'reachGoal', 'quit');
  });

  const openHistory = () => {
    $historySheet.classList.add('open');
    $sheetOverlay.classList.add('open');
    $btnHistory.style.background = '#f0ece6';
    ym(107322341, 'reachGoal', 'history');
  };
  const closeHistory = () => {
    $historySheet.classList.remove('open');
    $sheetOverlay.classList.remove('open');
    $btnHistory.style.background = 'transparent';
  };
  $btnHistory.addEventListener('click', openHistory);
  $btnSheetClose.addEventListener('click', closeHistory);
  $sheetOverlay.addEventListener('click', closeHistory);

  $btnRestart.addEventListener('click', restart);
  $btnPlayAgain.addEventListener('click', restart);

  updateBest(); renderHistory();
  if (history.length) $btnHistory.style.display = '';
  buildGrid();
</script>
</body>
</html>
